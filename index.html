<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hamasa Play</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --card: #131c30;
      --card-header-from: #0f1929;
      --card-header-to: #1a2540;
      --accent: #4f8ef7;
      --accent2: #a855f7;
      --accent3: #22d3ee;
      --gold: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --border: rgba(79,142,247,0.18);
      --glow: rgba(79,142,247,0.35);
      --grid-line: rgba(79,142,247,0.04);
      --radial-glow: rgba(79,142,247,0.12);
      --h1-start: #fff;
      --badge-bg: rgba(79,142,247,0.1);
      --pill-bg: rgba(255,255,255,0.04);
      --input-bg: rgba(255,255,255,0.04);
      --cat-badge-bg: rgba(0,0,0,0.5);
    }

    :root.light {
      --bg: #f0f4ff;
      --surface: #ffffff;
      --card: #ffffff;
      --card-header-from: #dde8ff;
      --card-header-to: #eaf0ff;
      --accent: #2563eb;
      --accent2: #7c3aed;
      --accent3: #0891b2;
      --gold: #d97706;
      --text: #1e293b;
      --muted: #64748b;
      --border: rgba(37,99,235,0.2);
      --glow: rgba(37,99,235,0.25);
      --grid-line: rgba(37,99,235,0.06);
      --radial-glow: rgba(37,99,235,0.08);
      --h1-start: #1e293b;
      --badge-bg: rgba(37,99,235,0.08);
      --pill-bg: rgba(37,99,235,0.06);
      --input-bg: rgba(37,99,235,0.04);
      --cat-badge-bg: rgba(255,255,255,0.75);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
      transition: background-image 0.4s;
    }

    body::after {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 500px;
      background: radial-gradient(ellipse at center, var(--radial-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 64px 24px 40px;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--badge-bg);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 18px 6px 10px;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--accent3);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background-color 0.4s, border-color 0.4s;
    }

    .logo-badge span {
      width: 8px; height: 8px;
      background: var(--accent3);
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 8px var(--accent3);
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, var(--h1-start) 30%, var(--accent) 70%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 14px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--muted);
      font-weight: 400;
      max-width: 420px;
      margin: 0 auto 36px;
      line-height: 1.6;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      max-width: 800px;
      margin: 0 auto 20px;
    }

    .search-box {
      position: relative;
      flex: 1;
      min-width: 240px;
      max-width: 380px;
    }

    .search-box svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 18px; height: 18px;
    }

    .search-box input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px 12px 42px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background-color 0.4s;
    }

    .search-box input::placeholder { color: var(--muted); }
    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
    }

    .filter-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pill {
      background: var(--pill-bg);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 18px;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Nunito', sans-serif;
      letter-spacing: 0.03em;
    }

    .pill:hover, .pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 16px var(--glow);
    }

    main {
      position: relative;
      z-index: 5;
      max-width: 1280px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .section-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .game-count {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .game-count strong { color: var(--accent); }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .game-card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s, background-color 0.4s;
      animation: fadeInUp 0.5s ease both;
    }

    .game-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: var(--accent);
      box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 30px var(--glow);
    }

    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(79,142,247,0.05) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .game-card:hover::before { opacity: 1; }

    .card-header {
      position: relative;
      height: 130px;
      background: linear-gradient(135deg, var(--card-header-from) 0%, var(--card-header-to) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background-color 0.4s;
    }

    .card-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40px;
      background: linear-gradient(to top, var(--card), transparent);
    }

    .card-bg-glow {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .game-card:hover .card-bg-glow { opacity: 1; }

    .game-icon-placeholder {
      width: 72px; height: 72px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      position: relative;
      z-index: 2;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      transition: transform 0.3s;
      background: rgba(255,255,255,0.05);
    }

    .game-card:hover .game-icon-placeholder {
      transform: scale(1.12) rotate(-2deg);
    }

    .category-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--cat-badge-bg);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 100px;
      padding: 3px 10px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      z-index: 3;
      transition: background-color 0.4s;
    }

    .card-body { padding: 16px 18px 18px; }

    .game-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .game-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 14px;
      font-weight: 600;
    }

    .play-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #3b6fd4);
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .play-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .play-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(79,142,247,0.5);
    }

    .play-btn:hover::before { opacity: 1; }
    .play-btn:active { transform: translateY(0); }

    .play-btn svg {
      width: 14px; height: 14px;
      fill: #fff;
    }

    /* CATEGORY COLORS */
    .cat-agama { color: var(--gold); }
    .cat-bahasa { color: #22c55e; }
    .cat-mtk { color: var(--accent3); }
    .cat-lainnya { color: #c8c8c8; }
    .cat-olahraga { color: #f97316; }
    .cat-puzzle { color: #ec4899; }
    .cat-gambar { color: #dff117; }
    .cat-kata { color: #2579ff; }

    .bg-agama { background: radial-gradient(circle at 50% 50%, rgba(245,158,11,0.25) 0%, transparent 70%); }
    .bg-bahasa { background: radial-gradient(circle at 50% 50%, rgba(34,197,94,0.25) 0%, transparent 70%); }
    .bg-mtk { background: radial-gradient(circle at 50% 50%, rgba(34,211,238,0.25) 0%, transparent 70%); }
    .bg-lainnya { background: radial-gradient(circle at 50% 50%, rgba(168,85,247,0.25) 0%, transparent 70%); }
    .bg-olahraga { background: radial-gradient(circle at 50% 50%, rgba(249,115,22,0.25) 0%, transparent 70%); }
    .bg-puzzle { background: radial-gradient(circle at 50% 50%, rgba(236,72,153,0.25) 0%, transparent 70%); }
    .bg-gambar { background: radial-gradient(circle at 50% 50%, rgba(236,72,153,0.25) 0%, transparent 70%); }
    .bg-kata { background: radial-gradient(circle at 50% 50%, rgba(236,72,153,0.25) 0%, transparent 70%); }

    /* === THEME TOGGLE === */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    .theme-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 4px 20px var(--glow);
    }

    .theme-toggle .toggle-track {
      width: 36px;
      height: 20px;
      border-radius: 100px;
      background: var(--border);
      position: relative;
      transition: background-color 0.3s;
    }

    .theme-toggle .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--muted);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), background-color 0.3s;
    }

    :root.light .toggle-track { background: var(--accent); }
    :root.light .toggle-thumb {
      transform: translateX(16px);
      background: #fff;
    }

    .toggle-icon { font-size: 1rem; line-height: 1; }

    footer {
      position: relative;
      z-index: 5;
      margin-top: 20px;
      border-top: 1px solid var(--border);
      background: var(--card);
      transition: background-color 0.4s, border-color 0.4s;
    }

    .footer-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 40px 24px 28px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 24px;
    }

    .footer-brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .footer-logo {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--h1-start) 20%, var(--accent) 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .footer-tagline {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 600;
    }

    .footer-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .footer-dot {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      box-shadow: 0 0 16px var(--glow);
    }

    .footer-copy {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .footer-copy strong { color: var(--accent); }

    .footer-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .footer-links {
      display: flex;
      gap: 16px;
    }

    .footer-links a {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      letter-spacing: 0.03em;
    }

    .footer-links a:hover { color: var(--accent); }

    .footer-divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 0;
    }

    .footer-bottom {
      text-align: center;
      padding: 12px 24px;
      font-size: 0.72rem;
      color: var(--muted);
      opacity: 0.6;
    }

    @media (max-width: 640px) {
      .footer-inner {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .footer-brand { align-items: center; }
      .footer-right { align-items: center; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 0.85rem;
      color: var(--text);
      z-index: 999;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s;
      opacity: 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    @media (max-width: 600px) {
      .games-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
  <span class="toggle-icon" id="themeIcon">🌙</span>
  <div class="toggle-track"><div class="toggle-thumb"></div></div>
  <span id="themeLabel">Dark</span>
</button>

<header>
  <div class="logo-badge">
    <span></span>
    Platform Game Edukasi
  </div>
  <h1>HAMASA PLAY</h1>

  <div class="controls">

    </div>
  </div>

  <div class="filter-pills">

    <button class="pill" onclick="setFilter('bahasa', this)">📖 Bahasa</button>
    <button class="pill" onclick="setFilter('mtk', this)">🔢 MTK</button>
    <button class="pill" onclick="setFilter('olahraga', this)">🏆 olahraga</button>
    <button class="pill" onclick="setFilter('agama', this)">🌙 Agama</button>
    <button class="pill" onclick="setFilter('puzzle', this)">🧩 Puzzle</button>
    <button class="pill" onclick="setFilter('gambar', this)">🖼️ Gambar</button>
    <button class="pill" onclick="setFilter('kata', this)">🔠 Kata</button>
    <button class="pill" onclick="setFilter('lainnya', this)">🌍 Lainnya</button>
  </div>
</header>

<main>
  <div class="section-label">// Game Library</div>
  <div class="game-count" id="game-count"></div>
  <div class="games-grid" id="games-grid"></div>
</main>

<footer>
  <div class="footer-inner">
    <div class="footer-brand">
      <div class="footer-logo">HAMASA PLAY</div>
      <div class="footer-tagline">Platform Game Edukasi Indonesia 🇮🇩</div>
    </div>
  </div>
  <div class="footer-divider"></div>
  <div class="footer-bottom">&copy; 2026 Hamasa Play</div>
</footer>

<div class="toast" id="toast"></div>

  let currentFilter = 'semua';

  function setFilter(cat, el) {
    currentFilter = cat;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    filterGames();
  }

  function filterGames() {
    const q = document.getElementById('search').value.toLowerCase();
    const grid = document.getElementById('games-grid');
    grid.innerHTML = '';

    const filtered = games.filter(g => {
      const matchCat = currentFilter === 'semua' || g.category === currentFilter;
      const matchQ = g.title.toLowerCase().includes(q) || g.label.toLowerCase().includes(q);
      return matchCat && matchQ;
    });

    document.getElementById('game-count').innerHTML =
      `Menampilkan <strong>${filtered.length}</strong> dari ${games.length} game`;

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <p style="font-size:2rem;margin-bottom:12px;">🔍</p>
          <p style="font-size:1rem;font-weight:600;margin-bottom:6px;">Game tidak ditemukan</p>
          <p style="font-size:0.85rem;">Coba kata kunci atau filter yang lain</p>
        </div>
      `;
      return;
    }

    filtered.forEach((g, i) => {
      const card = document.createElement('div');
      card.className = 'game-card';
      card.style.animationDelay = (i * 0.05) + 's';
      card.innerHTML = `
        <div class="card-header">
          <div class="card-bg-glow ${g.color}"></div>
          <div class="game-icon-placeholder">${g.emoji}</div>
          <div class="category-badge ${g.catClass}">${g.category.toUpperCase()}</div>
        </div>
        <div class="card-body">
          <div class="game-title">${g.title}</div>
          <div class="game-meta">${g.label}</div>
          <button class="play-btn" onclick="openGame('${g.url}', '${g.title}', event)">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg>
            MAIN
          </button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function openGame(url, title, e) {
    e.stopPropagation();
    showToast('🎮 Membuka ' + title + '...');
    setTimeout(() => { window.open(url, '_self'); }, 600);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  filterGames();

  // Theme toggle
  let isLight = false;
  function toggleTheme() {
    isLight = !isLight;
    document.documentElement.classList.toggle('light', isLight);
    document.getElementById('themeIcon').textContent = isLight ? '☀️' : '🌙';
    document.getElementById('themeLabel').textContent = isLight ? 'Light' : 'Dark';
    localStorage.setItem('hamasaTheme', isLight ? 'light' : 'dark');
    showToast(isLight ? '☀️ Tema terang aktif' : '🌙 Tema gelap aktif');
  }

  // Restore saved theme
  if (localStorage.getItem('hamasaTheme') === 'light') {
    isLight = true;
    document.documentElement.classList.add('light');
    document.getElementById('themeIcon').textContent = '☀️';
    document.getElementById('themeLabel').textContent = 'Light';
  }
</script>
