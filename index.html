<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hamasa Play</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #06091a;
      --surface: #0d1228;
      --card: #111830;
      --card2: #0e1525;
      --accent: #4f8ef7;
      --accent2: #a855f7;
      --accent3: #22d3ee;
      --gold: #f59e0b;
      --text: #eef2ff;
      --muted: #7a8bb5;
      --border: rgba(79,142,247,0.16);
      --glow: rgba(79,142,247,0.3);
      --grid-line: rgba(79,142,247,0.035);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      /* Smartboard: cursor always visible, large touch targets */
      cursor: default;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow top */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 1200px;
      height: 600px;
      background: radial-gradient(ellipse at center, rgba(79,142,247,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ========== HEADER ========== */
    header {
      position: relative;
      z-index: 10;
      padding: 36px 60px 28px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 40px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(13,18,40,0.95) 0%, transparent 100%);
    }

    .header-brand {
      display: block;
    }

    .header-badge {
      display: inline-block;
      background: rgba(34,211,238,0.1);
      border: 1px solid rgba(34,211,238,0.25);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 800;
      color: var(--accent3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .header-badge .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent3);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--accent3);
      animation: pulse-dot 2s infinite;
      vertical-align: middle;
      margin-right: 7px;
      position: relative;
      top: -1px;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .header-title {
      font-family: 'Orbitron', monospace;
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent) 60%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      display: block;
    }

    /* Search center */
    .header-search {
      position: relative;
    }

    .header-search svg {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 22px;
      height: 22px;
    }

    .header-search input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 20px 16px 52px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .header-search input::placeholder { color: var(--muted); }
    .header-search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
    }

    /* Header right: clock + theme */
    .header-right {
      text-align: right;
    }

    .classroom-clock {
      font-family: 'Orbitron', monospace;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--text);
      display: block;
      letter-spacing: 0.05em;
    }

    .classroom-date {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
      display: block;
      margin-top: 4px;
    }

    /* ========== FILTER BAR ========== */
    .filter-bar {
      position: relative;
      z-index: 9;
      padding: 20px 60px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: rgba(6,9,26,0.6);
    }

    .pill {
      display: inline-block;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      padding: 12px 24px;
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Nunito', sans-serif;
      letter-spacing: 0.04em;
      margin: 5px;
      vertical-align: middle;
      /* Large tap targets for smartboard */
      min-height: 48px;
      line-height: 1.2;
    }

    .pill:hover {
      border-color: rgba(79,142,247,0.5);
      color: var(--text);
      background: rgba(79,142,247,0.08);
    }

    .pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 20px var(--glow);
    }

    /* ========== MAIN GRID ========== */
    main {
      position: relative;
      z-index: 5;
      padding: 32px 60px 60px;
    }

    .grid-header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      margin-bottom: 24px;
    }

    .section-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }

    .game-count {
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 600;
    }

    .game-count strong { color: var(--accent); }

    /* Game grid — 4 columns on smartboard landscape */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 22px;
    }

    /* ========== GAME CARD ========== */
    .game-card {
      position: relative;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s;
      animation: fadeInUp 0.4s ease both;
    }

    .game-card:hover {
      transform: translateY(-6px) scale(1.015);
      border-color: rgba(79,142,247,0.5);
      box-shadow: 0 24px 48px rgba(0,0,0,0.3), 0 0 32px var(--glow);
    }

    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(79,142,247,0.04) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      z-index: 1;
    }

    .game-card:hover::before { opacity: 1; }

    /* Card top area */
    .card-header {
      position: relative;
      height: 150px;
      background: linear-gradient(135deg, #0f1929 0%, #1a2540 100%);
      text-align: center;
      line-height: 150px;
      overflow: hidden;
    }

    .card-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50px;
      background: linear-gradient(to top, var(--card), transparent);
    }

    .card-bg-glow {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .game-card:hover .card-bg-glow { opacity: 1; }

    .game-emoji {
      display: inline-block;
      font-size: 3rem;
      vertical-align: middle;
      position: relative;
      z-index: 2;
      transition: transform 0.3s ease;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    }

    .game-card:hover .game-emoji {
      transform: scale(1.15) rotate(-3deg);
    }

    .category-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      border-radius: 100px;
      padding: 4px 12px;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 3;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.08);
      line-height: normal;
    }

    .card-body {
      padding: 18px 20px 20px;
    }

    .game-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.88rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .game-meta {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 16px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* PLAY BUTTON — large, finger-friendly for smartboard */
    .play-btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, var(--accent) 0%, #3068d4 100%);
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      text-align: center;
      line-height: 1.4;
      /* min touch target */
      min-height: 52px;
    }

    .play-btn svg {
      display: inline-block;
      width: 16px;
      height: 16px;
      fill: #fff;
      vertical-align: middle;
      margin-right: 8px;
      position: relative;
      top: -1px;
    }

    .play-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .play-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(79,142,247,0.55);
    }

    .play-btn:hover::after { opacity: 1; }
    .play-btn:active { transform: scale(0.98); }

    /* CATEGORY COLORS */
    .cat-agama { color: var(--gold); }
    .cat-bahasa { color: #22c55e; }
    .cat-mtk { color: var(--accent3); }
    .cat-lainnya { color: #c084fc; }
    .cat-olahraga { color: #f97316; }
    .cat-puzzle { color: #ec4899; }
    .cat-gambar { color: #facc15; }
    .cat-kata { color: #60a5fa; }

    .bg-agama { background: radial-gradient(circle at 50% 50%, rgba(245,158,11,0.3) 0%, transparent 70%); }
    .bg-bahasa { background: radial-gradient(circle at 50% 50%, rgba(34,197,94,0.3) 0%, transparent 70%); }
    .bg-mtk { background: radial-gradient(circle at 50% 50%, rgba(34,211,238,0.3) 0%, transparent 70%); }
    .bg-lainnya { background: radial-gradient(circle at 50% 50%, rgba(192,132,252,0.3) 0%, transparent 70%); }
    .bg-olahraga { background: radial-gradient(circle at 50% 50%, rgba(249,115,22,0.3) 0%, transparent 70%); }
    .bg-puzzle { background: radial-gradient(circle at 50% 50%, rgba(236,72,153,0.3) 0%, transparent 70%); }
    .bg-gambar { background: radial-gradient(circle at 50% 50%, rgba(250,204,21,0.3) 0%, transparent 70%); }
    .bg-kata { background: radial-gradient(circle at 50% 50%, rgba(96,165,250,0.3) 0%, transparent 70%); }

    /* ========== EMPTY STATE ========== */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 40px;
      color: var(--muted);
    }

    .empty-state .empty-icon { font-size: 3rem; display: block; margin-bottom: 16px; }
    .empty-state h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 0.9rem; }

    /* ========== FOOTER / STATUS BAR ========== */
    footer {
      position: relative;
      z-index: 5;
      border-top: 1px solid var(--border);
      background: rgba(13,18,40,0.9);
      padding: 16px 60px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
    }

    .footer-left {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 600;
    }

    .footer-left strong { color: var(--accent3); }

    .footer-center-text {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-align: center;
    }

    .footer-right-text {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 600;
      text-align: right;
    }

    /* ========== TOAST ========== */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1.5px solid var(--accent);
      border-radius: 16px;
      padding: 16px 28px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      z-index: 999;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s;
      opacity: 0;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(79,142,247,0.25); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    @media (max-width: 900px) {
      header { padding: 20px 24px; gap: 16px; }
      main { padding: 24px 24px 48px; }
      .filter-bar { padding: 16px 24px; }
      footer { padding: 14px 24px; }
      .header-title { font-size: 1.8rem; }
      .classroom-clock { font-size: 1.5rem; }
      .games-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    }
  </style>
</head>

  /* =============================================
     OPEN GAME — Android WebView Bridge
     Tries Android interface first, falls back to window.open
  ============================================= */
  function openGame(url, title, e) {
    e.stopPropagation();
    showToast('🎮 Membuka ' + title + '...');

    setTimeout(function() {
      /*
       * Untuk Android WebView:
       * Panggil interface JavaScript yang di-expose dari Android (WebAppInterface).
       * Metode openBrowser(url) harus diimplementasikan di sisi Android
       * menggunakan Intent ACTION_VIEW agar terbuka di browser sistem.
       *
       * Contoh Android (Kotlin):
       *   class WebAppInterface(val context: Context) {
       *     @JavascriptInterface
       *     fun openBrowser(url: String) {
       *       val intent = Intent(Intent.ACTION_VIEW, Uri.parse(url))
       *       intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK)
       *       context.startActivity(intent)
       *     }
       *   }
       *   webView.addJavascriptInterface(WebAppInterface(this), "Android")
       */
      if (typeof Android !== 'undefined' && typeof Android.openBrowser === 'function') {
        Android.openBrowser(url);
      } else {
        /* Fallback: browser / desktop */
        window.open(url, '_blank');
      }
    }, 500);
  }

  /* =============================================
     FILTER & RENDER
  ============================================= */
  let currentFilter = 'semua';

  function setFilter(cat, el) {
    currentFilter = cat;
    document.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('active'); });
    el.classList.add('active');
    filterGames();
  }

  function filterGames() {
    var q = document.getElementById('search').value.toLowerCase();
    var grid = document.getElementById('games-grid');
    grid.innerHTML = '';

    var filtered = games.filter(function(g) {
      var matchCat = currentFilter === 'semua' || g.category === currentFilter;
      var matchQ = g.title.toLowerCase().includes(q) || g.label.toLowerCase().includes(q);
      return matchCat && matchQ;
    });

    document.getElementById('game-count').innerHTML =
      'Menampilkan <strong>' + filtered.length + '</strong> dari ' + games.length + ' game';

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty-state"><span class="empty-icon">🔍</span><h3>Game tidak ditemukan</h3><p>Coba kata kunci atau filter yang lain</p></div>';
      return;
    }

    filtered.forEach(function(g, i) {
      var card = document.createElement('div');
      card.className = 'game-card';
      card.style.animationDelay = (i * 0.04) + 's';

      var safeUrl = g.url.replace(/'/g, "\\'");
      var safeTitle = g.title.replace(/'/g, "\\'");

      card.innerHTML =
        '<div class="card-header">' +
          '<div class="card-bg-glow ' + g.color + '"></div>' +
          '<span class="game-emoji">' + g.emoji + '</span>' +
          '<div class="category-badge ' + g.catClass + '">' + g.category.toUpperCase() + '</div>' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="game-title">' + g.title + '</div>' +
          '<div class="game-meta">' + g.label + '</div>' +
          '<button class="play-btn" onclick="openGame(\'' + safeUrl + '\', \'' + safeTitle + '\', event)">' +
            '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg>' +
            'PLAY' +
          '</button>' +
        '</div>';

      grid.appendChild(card);
    });
  }

  /* =============================================
     TOAST
  ============================================= */
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2800);
  }

  /* =============================================
     CLOCK (Smartboard classroom clock)
  ============================================= */
  var HARI = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  var BULAN = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];

  function updateClock() {
    var now = new Date();
    var h = String(now.getHours()).padStart(2, '0');
    var m = String(now.getMinutes()).padStart(2, '0');
    var s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = h + ':' + m + ':' + s;

    var hari = HARI[now.getDay()];
    var tgl = now.getDate();
    var bln = BULAN[now.getMonth()];
    var thn = now.getFullYear();
    document.getElementById('dateLabel').textContent = hari + ', ' + tgl + ' ' + bln + ' ' + thn;
  }

  updateClock();
  setInterval(updateClock, 1000);

  /* Init */
  filterGames();
